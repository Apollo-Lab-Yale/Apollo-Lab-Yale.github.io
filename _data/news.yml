# ==========================================
# HOW TO ADD NEWS ITEMS
# ==========================================
# This file controls the dynamic News Feed. To add a new item,
# copy a block (from `- date:` down to the end of `content: |`)
# and paste it at the TOP of the list (to keep it chronological).
#
# FIELDS:
#   date:   (Required) YYYY-MM-DD format. Used for sorting/display.
#   title:  (Required) The headline of the news item.
#   type:   (Optional) The category. Common types: Award, Publication, 
#           Conference, Grant, Media, Talk. Defaults to "Announcement".
#   tags:   (Optional) Array of keywords used for the 'Keyword Filtering' 
#           dropdown on the site.
#           Example: tags: [Robotics, Award]
#   content: (Required) The body text. Supports Markdown and Liquid.
#            Use `|` for multi-line text blocks.
# ==========================================

- date: "2026-01-20"
