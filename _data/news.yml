  title: "Paper accepted to the Journal of Robotic Surgery"
  content: |
    Our paper titled "**Deep learning approach for critical exposure during division of the inferior mesenteric artery in colorectal surgery**" has been accepted for publication in the *Journal of Robotic Surgery*. 
    
    You can read the full article here: [https://link.springer.com/article/10.1007/s11701-025-03121-7](https://link.springer.com/article/10.1007/s11701-025-03121-7)
    
    Congratulations to the entire team!

