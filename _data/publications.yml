# ==========================================
# HOW TO ADD PUBLICATIONS
# ==========================================
# Items here appear on the /publications page and are automatically 
# grouped by year. 
#
# FIELDS:
#   title:   (Required) Full title of the paper.
#   authors: (Required) List of authors.
#   venue:   (Optional) Conference or journal name (e.g., IROS, RSS).
#            Leave blank or comment out for preprints.
#   year:    (Required) Integer year.
#   type:    (Optional) Category for filtering (Conference, Journal, etc).
#   link:    (Optional) URL to the PDF or publication page.
#   video:   (Optional) YouTube embed URL (e.g., https://www.youtube.com/embed/...)
#   website: (Optional) Project page URL.
#   code:    (Optional) GitHub or source code repository link.
#   crates:  (Optional) Link to crates.io (for Rust projects).
#   keywords: (Optional) Comma-separated tags (e.g., "Robotics, ML").
#   threads:  (Optional) Array of Research Thread titles to cross-link.
#   extra_links: (Optional) Array for custom links.
#       Example:
#       extra_links:
#         - name: "Dataset"
#           url: "https://..."
#           icon: "fas fa-database" # FontAwesome class
# ==========================================

