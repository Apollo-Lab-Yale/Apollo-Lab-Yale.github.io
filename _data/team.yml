# ==========================================
# HOW TO ADD TEAM MEMBERS
# ==========================================
# This file controls the /team page. Members are grouped by 
# `role_separator` headings in the order they appear here.
#
# CORE FIELDS:
#   name:  (Required) Full name.
#   role:  (Required) Displayed next to name (e.g., PI, Ph.D. Student).
#   image: (Optional) Path to headshot in assets/theme/images/team/.
#
# SOCIAL & ACADEMIC (Optional):
#   website:       Full URL to personal website.
#   email:         Full email address.
#   googlescholar: Google Scholar ID or full link.
#   github:        GitHub username.
#   orcid:         ORCID ID (e.g., 0000-0000-0000-0000).
#   twitter:       Twitter/X username.
#   mastodon:      Full URL to Mastodon profile.
#   researchgate:  ResearchGate username.
#
# CROSS-LINKING & ADDITIONAL INFO (Optional):
#   threads: Array of research thread titles this person belongs to.
#            Example: threads: ["Motion Generation Algorithms"]
#   now_at:  For alumni, brief note on current location.
#            Example: now_at: "Now Master's student at UMich"
#   description: A longer bio. Supports Markdown.
# ==========================================

